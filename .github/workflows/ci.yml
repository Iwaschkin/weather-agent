name: CI

on:
    push:
        branches: [main]
    pull_request:

jobs:
    quality:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            # setup-uv v8+ publishes no moving major tag; pin the exact
            # release. The deployed Dependabot config keeps it current.
            - uses: astral-sh/setup-uv@v8.3.2
              with:
                  enable-cache: true

            - name: Sync environment
              run: uv sync --locked --group web

            - name: Lint
              run: uv run ruff check .

            - name: Format check
              run: uv run ruff format --check .

            - name: Type check
              run: uv run pyright

            - name: Test
              run: uv run pytest

    web-build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - uses: astral-sh/setup-uv@v8.3.2
              with:
                  enable-cache: true

            - name: Install Reflex system prerequisites
              run: |
                  sudo apt-get update
                  sudo apt-get install --yes unzip

            - name: Sync environment with dashboard dependencies
              run: uv sync --locked --group web

            - name: Dashboard lint and format
              run: |
                  uv run ruff check web tests/test_web_dashboard.py
                  uv run ruff format --check web tests/test_web_dashboard.py

            - name: Dashboard tests
              run: uv run pytest tests/test_web_dashboard.py

            - name: Import dashboard
              working-directory: web
              run: uv run python -c "from weather_dashboard.weather_dashboard import app"

            - name: Production frontend export
              working-directory: web
              run: uv run reflex export --frontend-only --no-zip
